name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: app

jobs:
  build-and-test:
    # Atlas is a Windows-only app today (see CLAUDE.md — macOS build/verification
    # is an explicitly deferred, post-beta item). Match that with a Windows runner
    # rather than adding a macOS/Linux job this app was never verified against.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches the Node version this whole test suite has actually been
          # verified against locally throughout this project (v24) - Node 20
          # was an arbitrary LTS pick with no real verification behind it and
          # is a likely suspect for a CI-only failure with no per-test
          # annotation (i.e. a crash, not a clean assertion failure).
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        shell: pwsh
        run: |
          npm run test *>&1 | Tee-Object -FilePath unit-test-output.log
          exit $LASTEXITCODE

      - name: Upload unit test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: app/unit-test-output.log

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
