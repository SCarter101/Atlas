<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="border:1px solid {{ borderColor }}; border-radius:10px; padding:16px 18px; margin-bottom:10px; background:{{ cardBg }}; border-style:{{ borderStyle }};">
  <button onclick="{{ toggle }}" style="width:100%; display:flex; justify-content:space-between; align-items:center; background:transparent; border:none; cursor:pointer; text-align:left; font-family:'Public Sans',sans-serif; padding:0;">
    <div>
      <div style="font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:{{ inkFaint }}; margin-bottom:4px;">{{ typeLabel }}</div>
      <div style="font-size:15px; font-weight:600; color:{{ ink }}; display:flex; align-items:center; gap:8px;">{{ title }}
        <sc-if value="{{ isPrivate }}" hint-placeholder-val="{{ false }}">
          <span style="font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; background:{{ inkFaintBg }}; color:{{ inkFaint }};">Private</span>
        </sc-if>
      </div>
    </div>
    <span style="font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:10px; background:{{ statusBg }}; color:{{ statusColor }}; flex-shrink:0;">{{ statusLabel }}</span>
  </button>
  <sc-if value="{{ isExpanded }}" hint-placeholder-val="{{ false }}">
    <div style="font-size:13px; color:{{ inkSoft }}; line-height:1.6; margin-top:10px; padding-top:10px; border-top:1px solid {{ borderColor }};">{{ body }}</div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:90}}">
class Component extends DCLogic {
  renderVals() {
    const c = this.props.c || {};
    const e = this.props.entry || {};
    const isExpanded = this.props.expanded === e.id;
    return {
      typeLabel: e.type, title: e.title, body: e.body,
      isPrivate: !!e.private,
      isExpanded,
      toggle: () => (this.props.onToggle || (() => {}))(e.id),
      statusBg: e.statusMeta ? e.statusMeta.bg : c.border,
      statusColor: e.statusMeta ? e.statusMeta.color : c.inkFaint,
      statusLabel: e.statusMeta ? e.statusMeta.label : '',
      borderColor: e.private ? c.borderStrong : c.border,
      borderStyle: e.private ? 'dashed' : 'solid',
      cardBg: c.surfaceRaised,
      ink: c.ink, inkSoft: c.inkSoft, inkFaint: c.inkFaint,
      inkFaintBg: c.border
    };
  }
}

</script>
</body>
</html>
