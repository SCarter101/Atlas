name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: app

jobs:
  build-and-test:
    # Atlas is a Windows-only app today (see CLAUDE.md — macOS build/verification
    # is an explicitly deferred, post-beta item). Match that with a Windows runner
    # rather than adding a macOS/Linux job this app was never verified against.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
