name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: app

jobs:
  build-and-test:
    # Atlas is a Windows-only app today (see CLAUDE.md — macOS build/verification
    # is an explicitly deferred, post-beta item). Match that with a Windows runner
    # rather than adding a macOS/Linux job this app was never verified against.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches the Node version this whole test suite has actually been
          # verified against locally throughout this project (v24) - Node 20
          # was an arbitrary LTS pick with no real verification behind it and
          # is a likely suspect for a CI-only failure with no per-test
          # annotation (i.e. a crash, not a clean assertion failure).
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        # Three prior CI-only failures here reported no per-test annotation
        # at all (unlike the ENOTEMPTY fixes above, which did) - consistent
        # with a worker-thread crash rather than a clean assertion failure.
        # GitHub's standard windows-latest runner (2 cores / 7GB for public
        # repos) is far more resource-constrained than a local dev machine;
        # vitest's default pool spins up multiple parallel worker threads
        # per file, and this suite includes several genuinely heavy tests
        # (a ~120k-word fixture generated more than once, a 20k-word O(n*m)
        # diff stress test) that a local machine's extra cores/RAM absorb
        # without issue. --no-file-parallelism runs test files sequentially
        # instead, trading CI wall-clock time for reliability on constrained
        # hardware - a standard accommodation, not a workaround for a real
        # bug (a from-scratch npm ci + npm run test reproduced 492/492 green
        # locally, ruling out a dependency or logic regression).
        run: npx vitest run --no-file-parallelism

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
