<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:26px; height:26px; border-radius:7px; background:{{ iconBg }}; display:flex; align-items:center; justify-content:center;">
        <dc-import name="AssistantIcon" kind="{{ iconKind }}" color="{{ accent }}" size="14" hint-size="14px,14px"></dc-import>
      </div>
      <div style="font-size:13.5px; font-weight:600; color:{{ ink }};">{{ name }}</div>
    </div>
    <button onclick="{{ onClose }}" style="border:none; background:transparent; cursor:pointer; font-size:15px; color:{{ inkFaint }};">×</button>
  </div>
  <div style="font-size:12px; color:{{ inkFaint }}; margin-bottom:4px;">{{ model }}</div>
  <div style="font-size:12.5px; color:{{ inkSoft }}; margin-bottom:12px;">{{ status }}</div>
  <div style="display:flex; gap:8px;">
    <button onclick="{{ onInvoke }}" style="flex:1; padding:7px 0; border-radius:7px; border:none; background:{{ accent }}; color:{{ bg }}; font-size:12px; font-weight:600; cursor:pointer; font-family:'Public Sans',sans-serif;">Invoke on scene</button>
    <button style="flex:1; padding:7px 0; border-radius:7px; border:1px solid {{ border }}; background:transparent; color:{{ inkSoft }}; font-size:12px; cursor:pointer; font-family:'Public Sans',sans-serif;">Configure</button>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:180}}">
class Component extends DCLogic {
  renderVals() {
    const c = this.props.c || {};
    const a = this.props.a || {};
    return {
      name: a.name, model: a.model, status: a.status, iconKind: a.iconKind,
      iconBg: c.accentSoft, accent: c.accent, ink: c.ink, inkFaint: c.inkFaint,
      inkSoft: c.inkSoft, bg: c.bg, border: c.border,
      onClose: this.props.onClose || (() => {}),
      onInvoke: () => (this.props.onInvoke || (() => {}))(a.id)
    };
  }
}

</script>
</body>
</html>
